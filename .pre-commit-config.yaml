# Pre-commit hooks — run `pre-commit install` to activate.
# Requires: pip install pre-commit (or brew install pre-commit)
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks — scan for secrets
        description: Detect hardcoded secrets before they reach git history
        args: ["--config", ".gitleaks.toml"]
